<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Hierarchy Explorer</title>
  <meta name="description" content="Explore hierarchical relationships with the BFHL API – visualize trees, detect cycles, and analyze node structures." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main id="app">
    <header class="header" id="header">
      <div class="header-badge">
        <span class="header-icon">⬡</span>
        <span>BFHL</span>
      </div>
      <h1 class="header-title">Hierarchy Explorer</h1>
      <p class="header-subtitle">Parse node relationships, build trees, detect cycles &amp; more.</p>
    </header>

    <section class="input-section glass-card" id="input-section">
      <h2 class="section-title"><span class="section-icon">🔗</span> Node Input</h2>
      <p class="input-hint">Enter edges like <code>A-&gt;B</code>, one per line or comma-separated.</p>
      <textarea
        id="nodeInput"
        class="node-textarea"
        rows="6"
        placeholder="A->B, A->C, B->D, C->E, E->F&#10;X->Y, Y->Z, Z->X&#10;P->Q, Q->R"
        spellcheck="false"
      ></textarea>
      <div class="input-actions">
        <button id="loadExampleBtn" class="btn btn-ghost" type="button">Load Example</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
        <button id="submitBtn" class="btn btn-primary" type="button">
          <span class="btn-text">Analyze</span>
          <span class="btn-loader" hidden>
            <span class="spinner"></span>
          </span>
        </button>
      </div>
    </section>

    <div id="errorBanner" class="error-banner" hidden>
      <span class="error-icon">⚠</span>
      <span id="errorText"></span>
      <button id="dismissError" class="error-dismiss">&times;</button>
    </div>

    <section id="resultsSection" class="results-section" hidden>
      <div class="summary-grid" id="summaryGrid">
        <div class="stat-card glass-card" id="statTrees">
          <span class="stat-value" id="valTrees">0</span>
          <span class="stat-label">Trees</span>
        </div>
        <div class="stat-card glass-card" id="statCycles">
          <span class="stat-value" id="valCycles">0</span>
          <span class="stat-label">Cycles</span>
        </div>
        <div class="stat-card glass-card" id="statLargest">
          <span class="stat-value" id="valLargest">–</span>
          <span class="stat-label">Largest Root</span>
        </div>
        <div class="stat-card glass-card" id="statInvalid">
          <span class="stat-value" id="valInvalid">0</span>
          <span class="stat-label">Invalid</span>
        </div>
      </div>

      <div id="hierarchiesContainer"></div>

      <div id="issuesPanel" class="issues-panel glass-card" hidden>
        <h2 class="section-title"><span class="section-icon">🚩</span> Issues</h2>
        <div class="issues-grid">
          <div id="invalidEntriesCard" class="issue-group" hidden>
            <h3 class="issue-title">Invalid Entries</h3>
            <ul id="invalidList" class="issue-list"></ul>
          </div>
          <div id="duplicateEdgesCard" class="issue-group" hidden>
            <h3 class="issue-title">Duplicate Edges</h3>
            <ul id="duplicateList" class="issue-list"></ul>
          </div>
        </div>
      </div>

      <details class="raw-json glass-card" id="rawJsonDetails">
        <summary class="raw-json-summary">Raw JSON Response</summary>
        <pre id="rawJson" class="raw-json-pre"></pre>
      </details>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
